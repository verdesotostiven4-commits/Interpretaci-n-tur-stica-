<style>
:root{--bg:#120f0b;--paper:#f7efdf;--ink:#1f170f;--muted:#6d5d4a;--green:#2d5c40;--clay:#b76437;--gold:#d4a33e;--cream:#fff8eb}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;color:var(--cream);font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 15% 10%,#d4a33e44,transparent 28%),radial-gradient(circle at 88% 72%,#2d5c4077,transparent 32%),linear-gradient(135deg,#130f0b,#26170d 50%,#10170f)}body:before{content:"";position:fixed;inset:0;opacity:.12;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.75' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}button{font:inherit}.app{height:100vh;padding:22px clamp(16px,3vw,42px);display:grid;grid-template-rows:auto 5px 1fr auto;gap:16px;position:relative}.top{height:70px;border:1px solid #fff4;border-radius:24px;background:#140f0b99;backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 14px;box-shadow:0 25px 70px #0007}.brand{display:flex;align-items:center;gap:12px;min-width:245px}.mark{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ffe59a);color:var(--ink);font:800 25px 'Playfair Display'}.brand small{display:block;color:#fff9;font-size:12px}.tabs{display:flex;gap:6px;overflow:auto;scrollbar-width:none}.tabs button,.ghost{border:0;border-radius:999px;padding:9px 12px;color:#fff9;background:#ffffff12;cursor:pointer;white-space:nowrap}.tabs button.active{background:var(--paper);color:var(--ink);font-weight:800}.actions{display:flex;gap:8px}.progress{height:5px;background:#ffffff24;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--clay),#6b9a5d);transition:.4s}.stage{display:grid;place-items:center;opacity:0;transform:translateY(18px) scale(.99);transition:.32s}.stage.show{opacity:1;transform:none}.slide{width:min(1180px,100%);height:min(650px,calc(100vh - 190px));border:1px solid #fff6;border-radius:32px;background:linear-gradient(135deg,#fff8ea,#ead6b8);color:var(--ink);box-shadow:0 35px 100px #0008;padding:clamp(28px,5vw,62px);display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(26px,5vw,58px);align-items:center;position:relative;overflow:hidden}.slide:before{content:"";position:absolute;inset:18px;border:1px dashed #23170d33;border-radius:22px}.slide:after{content:"";position:absolute;right:-110px;top:-150px;width:360px;height:360px;border-radius:50%;background:#b7643720}.copy,.visual{position:relative;z-index:2}.k{margin:0 0 14px;color:var(--green);font-weight:900;letter-spacing:.13em;text-transform:uppercase;font-size:13px}.k:before{content:"";display:inline-block;width:26px;height:2px;background:var(--clay);margin-right:10px;vertical-align:middle}h1{font-family:'Playfair Display',serif;font-size:clamp(37px,5.4vw,72px);line-height:.96;letter-spacing:-.04em;margin:0}.lead{font-size:clamp(17px,1.5vw,21px);line-height:1.55;color:#5d4d3d;margin:24px 0 0}.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}.chips span,.pill{background:#2d5c4018;color:var(--green);font-weight:800;border-radius:999px;padding:10px 13px}.visual{min-height:390px;border:1px solid #2a190e20;border-radius:28px;background:#ffffff70;display:grid;place-items:center;padding:24px}.emblem{position:relative;width:100%;height:390px;border-radius:28px;background:linear-gradient(180deg,#2d5c4022,#d4a33e30);overflow:hidden}.sun{position:absolute;left:50%;top:80px;transform:translateX(-50%);width:110px;height:110px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 25px #d4a33e25}.mount{position:absolute;bottom:95px;left:50%;transform:translateX(-50%);display:flex;align-items:end;gap:5px}.mount i{width:120px;height:130px;background:var(--green);clip-path:polygon(50% 0,100% 100%,0 100%)}.mount i:nth-child(2){height:170px;background:#244932}.woven{position:absolute;bottom:62px;left:10%;right:10%;height:15px;border-radius:99px;background:repeating-linear-gradient(90deg,var(--clay) 0 18px,var(--gold) 18px 36px,var(--green) 36px 54px)}.big{font-size:120px;color:#b7643740;font-family:'Playfair Display'}.cards{display:grid;gap:12px;width:100%}.card{background:#fff8;border:1px solid #1f170f16;border-radius:22px;padding:18px}.card b{display:block;font-size:20px}.card small,.card p{color:var(--muted);line-height:1.45}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.num{color:var(--clay);font-weight:900;font-size:24px}.mosaic{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:110px;gap:12px;width:100%}.tile{grid-column:span 3;border-radius:24px;padding:18px;color:#fff;font-weight:900;display:flex;align-items:end;background:linear-gradient(135deg,var(--green),var(--clay));box-shadow:0 15px 35px #0002}.tile:nth-child(3),.tile:nth-child(4),.tile:nth-child(5){grid-column:span 2}.route{display:grid;gap:14px;width:100%}.stop{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:center;background:#fff8;border-radius:22px;padding:16px;position:relative}.stop:not(:last-child):after{content:"";position:absolute;left:41px;bottom:-16px;width:3px;height:16px;background:var(--gold)}.stop span{width:52px;height:52px;border-radius:17px;background:var(--gold);display:grid;place-items:center;font-weight:900}.controls{justify-self:center;display:flex;gap:16px;align-items:center;background:#140f0baa;border:1px solid #fff4;border-radius:999px;padding:10px;box-shadow:0 20px 60px #0007}.round{width:48px;height:48px;border:0;border-radius:50%;background:var(--paper);font-size:24px;cursor:pointer}.count{font-weight:900;min-width:88px;text-align:center}.count span:first-child{color:var(--gold)}.notes{position:fixed;right:34px;bottom:96px;width:min(420px,calc(100vw - 44px));background:#140f0bdd;color:var(--cream);border:1px solid #fff4;border-radius:22px;padding:18px;box-shadow:0 25px 70px #0008;opacity:0;transform:translateY(15px);pointer-events:none;transition:.25s}.notes.show{opacity:1;transform:none}.notes b{color:var(--gold)}dialog{border:0;border-radius:28px;padding:20px;background:#fff8ea;color:var(--ink);width:min(920px,calc(100vw - 36px));box-shadow:0 35px 120px #0009}dialog::backdrop{background:#0009;backdrop-filter:blur(8px)}.modalHead{display:flex;justify-content:space-between;gap:12px;margin-bottom:16px}.close{border:0;border-radius:50%;width:42px;height:42px;font-size:26px;background:#eadcc7}.map{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-height:66vh;overflow:auto}.map button{text-align:left;border:1px solid #0001;border-radius:18px;background:#fff;padding:15px;cursor:pointer}.map button.active{outline:3px solid var(--gold)}.map span{color:var(--clay);font-weight:900}.map b{display:block;margin:5px 0}.map small{color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}@media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh}.top{height:auto;flex-wrap:wrap}.brand{min-width:100%}.actions{width:100%;justify-content:flex-end}.slide{height:auto;min-height:calc(100vh - 210px);grid-template-columns:1fr}.two,.map{grid-template-columns:1fr}.mosaic{grid-template-columns:1fr}.tile{grid-column:auto!important}h1{font-size:40px}}
</style>

<body>
<main class="app">
<header class="top"><div class="brand"><span class="mark">R</span><div><b>Rumicruz</b><small>bitácora de interpretación turística</small></div></div><nav class="tabs" id="tabs"></nav><div class="actions"><button class="ghost" id="notesBtn">Notas</button><button class="ghost" id="mapBtn">Mapa</button><button class="ghost" id="fullBtn">Pantalla</button></div></header>
<div class="progress"><span id="bar"></span></div><section id="stage" class="stage"></section><aside id="notes" class="notes"></aside><footer class="controls"><button class="round" id="prev">←</button><div class="count"><span id="now">01</span> / <span id="total">13</span></div><button class="round" id="next">→</button></footer>
</main>
<dialog id="modal"><div class="modalHead"><div><b>Mapa rápido</b><br><small>Elige una parte de la exposición</small></div><button class="close" id="close">×</button></div><div class="map" id="map"></div></dialog>
<script>
const slides=[
{s:'Inicio',t:'cover',k:'Fundamentos de Investigación Científica',h:'Diagnóstico de la interpretación turística del patrimonio cultural en la comunidad de Rumicruz',p:'Una exposición visual sobre territorio, memoria oral y turismo cultural sostenible.',tags:['ESPOCH','Carrera de Turismo','Rumicruz / Calpi'],n:'Abre diciendo: Rumicruz no necesita inventar una historia, necesita contar mejor la que ya tiene.'},
{s:'Contexto',t:'split',k:'Punto de partida',h:'El patrimonio está presente, pero no siempre está interpretado.',p:'La comunidad posee bienes culturales materiales e inmateriales. El visitante puede mirar el paisaje, las artesanías o los espacios comunitarios, pero muchas veces no comprende su valor simbólico.',call:'Interpretar es pasar de mirar a comprender.',n:'No digas que la comunidad no tiene turismo; di que existe potencial, pero falta ordenar el relato.'},
{s:'Contexto',t:'question',k:'Pregunta guía',h:'¿Cómo puede Rumicruz fortalecer la interpretación turística de su patrimonio cultural?',p:'La pregunta se enfoca en conservar la identidad local y promover un turismo más sostenible, respetuoso y útil para la comunidad.',tags:['Identidad','Conservación','Experiencia','Desarrollo local'],n:'Explica que el trabajo no reemplaza la voz comunitaria: le da herramientas para comunicar mejor.'},
{s:'Objetivos',t:'steps',k:'Objetivo general',h:'Diagnosticar el estado actual de la puesta en valor del patrimonio cultural de Rumicruz.',p:'El trabajo se ordenó en tres objetivos específicos: caracterizar recursos, analizar estrategias existentes y plantear sugerencias de fortalecimiento.',items:[['01','Caracterizar recursos','Identificar bienes y manifestaciones culturales.'],['02','Analizar estrategias','Reconocer cómo se explica actualmente la cultura.'],['03','Proponer mejoras','Plantear acciones concretas de fortalecimiento.']],n:'Esta slide ayuda a mostrar que la exposición sigue el orden del documento.'},
{s:'Método',t:'method',k:'Metodología',h:'Se combinó información documental con voces de actores locales.',p:'La investigación usó revisión documental, fichas de registro patrimonial, entrevistas semiestructuradas y análisis referencial para construir sugerencias viables.',items:['Revisión documental','Fichas de registro','Entrevistas semiestructuradas','Análisis de propuestas'],n:'Remarca que las entrevistas permiten escuchar lo que pasa realmente en territorio.'},
{s:'Hallazgos',t:'list',k:'Resultado 1',h:'Rumicruz cuenta con una matriz patrimonial diversa.',p:'Los recursos identificados articulan arqueología, memoria comunitaria, artesanías, gastronomía y festividades.',items:[['Arqueología Puruhá de Pailacucha','material / arqueológico'],['Centro de Tradiciones que Nos Unen','memoria comunitaria'],['Centro de Artesanías','saberes productivos'],['La fanesca','gastronomía ritual'],['Fiesta de San Pedro','patrimonio festivo']],n:'No lo presentes como inventario frío; di que combina lo tangible con lo vivo.'},
{s:'Hallazgos',t:'focus',k:'Patrimonio material',h:'Pailacucha tiene valor arqueológico y requiere protección interpretativa.',p:'El registro documental menciona restos Puruhá, fragmentos cerámicos y prácticas funerarias que pueden aportar a la identidad local y al turismo patrimonial responsable.',tags:['Restos sensibles','Investigación','Señalética','Turismo responsable'],n:'Conecta con señalética: si el visitante no sabe el valor, puede dañar sin querer.'},
{s:'Hallazgos',t:'mosaic',k:'Patrimonio inmaterial',h:'La cultura viva aparece en fiestas, comida, tejido y memoria oral.',p:'La Fiesta de San Pedro, la fanesca, el Centro de Tradiciones y las prácticas artesanales muestran que el patrimonio se vive, se recuerda y se transmite en comunidad.',items:['Fiesta de San Pedro','Fanesca','Pampa mesa','Cabuya y lana','Relatos comunitarios'],n:'Aquí conviene sonar cercano: el turista no solo quiere ver, también quiere participar.'},
{s:'Entrevistas',t:'people',k:'Resultado 2',h:'La interpretación existe, pero todavía es empírica y espontánea.',p:'Las entrevistas evidencian que la explicación depende de la memoria, la oralidad y la voluntad de los comuneros. Esa es una fortaleza humana, pero necesita apoyo técnico.',items:[['Esteban Lata','oral y demostrativa'],['Manuela Toaza','in situ y participativa'],['Ángela Lata','vivencial y gastronómica'],['José Toaza','sensorial y narrativa']],n:'No presentes lo empírico como malo; es una base valiosa que necesita estructura.'},
{s:'Brecha',t:'compare',k:'Problema central',h:'La comunidad tiene contenido, pero le faltan herramientas para comunicarlo con seguridad.',p:'Se identifican cuatro brechas: falta de señalética, ausencia de un guion común, poca participación activa del turista y recelo al hablar en público.',bad:['Sin carteles ni paneles','Relato improvisado','Turista pasivo','Miedo escénico'],good:['Señales claras','Guion flexible','Talleres vivenciales','Capacitación local'],n:'Esta slide prepara la transición: de cada brecha sale una solución.'},
{s:'Propuesta',t:'proposal',k:'Resultado 3',h:'Cuatro acciones para fortalecer la interpretación turística.',p:'Las sugerencias buscan convertir la guianza espontánea en una experiencia clara, protegida y participativa.',items:[['Señalética interpretativa','Paneles breves y normativos para orientar y proteger.'],['Guion oficial flexible','Historia Puruhá, leyendas y botánica local en un relato común.'],['Rutas vivenciales','Ruta de la Cabuya y la Lana con talleres y pampa mesa.'],['Capacitación local','Expresión oral, manejo de grupos y atención al visitante.']],n:'Di que son acciones realistas, no una propuesta imposible.'},
{s:'Propuesta',t:'route',k:'Idea innovadora',h:'Ruta de la Cabuya y la Lana: del observador al visitante participante.',p:'La ruta puede convertir el trabajo artesanal en experiencia: inicio, recorrido, actividad práctica, comida comunitaria y cierre reflexivo sobre conservación.',items:['Bienvenida','Relato del territorio','Taller artesanal','Pampa mesa','Mensaje de conservación'],n:'Véndela como producto turístico humano, ordenado y con beneficio local.'},
{s:'Cierre',t:'closing',k:'Conclusión',h:'Interpretar Rumicruz es cuidar su memoria y abrir oportunidades sostenibles.',p:'El patrimonio ya existe. El reto es organizarlo, comunicarlo con emoción y protegerlo con participación comunitaria.',call:'De patrimonio observado a patrimonio vivido.',n:'Cierra con seguridad: no es solo turismo, también es orgullo local y transmisión cultural.'}
];
const stage=document.getElementById('stage'),bar=document.getElementById('bar'),now=document.getElementById('now'),total=document.getElementById('total'),tabs=document.getElementById('tabs'),notes=document.getElementById('notes'),modal=document.getElementById('modal'),map=document.getElementById('map');let i=0,showNotes=false;total.textContent=String(slides.length).padStart(2,'0');const sections=[...new Set(slides.map(x=>x.s))];
function shell(x,visual){return `<article class="slide"><div class="copy"><p class="k">${x.k}</p><h1>${x.h}</h1><p class="lead">${x.p||''}</p>${x.tags?`<div class="chips">${x.tags.map(a=>`<span>${a}</span>`).join('')}</div>`:''}</div>${visual}</article>`}
const view={cover:x=>`<article class="slide"><div class="copy"><p class="k">${x.k}</p><h1>${x.h}</h1><p class="lead">${x.p}</p><div class="chips">${x.tags.map(a=>`<span>${a}</span>`).join('')}</div></div><div class="visual"><div class="emblem"><div class="sun"></div><div class="mount"><i></i><i></i><i></i></div><div class="woven"></div></div></div></article>`,split:x=>shell(x,`<div class="visual"><div class="big">⌖</div><b style="font-size:30px;color:var(--green)">Rumicruz / Calpi</b><small>Paisaje cultural con memoria viva</small><p class="pill">${x.call}</p></div>`),question:x=>shell(x,`<div class="visual"><div class="big">?</div><div class="chips">${x.tags.map(a=>`<span>${a}</span>`).join('')}</div></div>`),steps:x=>shell(x,`<div class="cards">${x.items.map(a=>`<div class="card"><span class="num">${a[0]}</span><b>${a[1]}</b><p>${a[2]}</p></div>`).join('')}</div>`),method:x=>shell(x,`<div class="two">${x.items.map((a,n)=>`<div class="card"><span class="num">${String(n+1).padStart(2,'0')}</span><b>${a}</b><small>parte del diagnóstico</small></div>`).join('')}</div>`),list:x=>shell(x,`<div class="cards">${x.items.map((a,n)=>`<div class="card"><span class="num">${String(n+1).padStart(2,'0')}</span><b>${a[0]}</b><small>${a[1]}</small></div>`).join('')}</div>`),focus:x=>shell(x,`<div class="visual"><div class="big">◜</div><div class="chips">${x.tags.map(a=>`<span>${a}</span>`).join('')}</div></div>`),mosaic:x=>shell(x,`<div class="mosaic">${x.items.map(a=>`<div class="tile">${a}</div>`).join('')}</div>`),people:x=>shell(x,`<div class="two">${x.items.map(a=>`<div class="card"><span class="num">${a[0].split(' ').map(p=>p[0]).join('')}</span><b>${a[0]}</b><small>${a[1]}</small></div>`).join('')}</div>`),compare:x=>shell(x,`<div class="two"><div class="card"><b>Brechas actuales</b>${x.bad.map(a=>`<p>− ${a}</p>`).join('')}</div><div class="card"><b>Hacia dónde avanzar</b>${x.good.map(a=>`<p>+ ${a}</p>`).join('')}</div></div>`),proposal:x=>shell(x,`<div class="two">${x.items.map((a,n)=>`<div class="card"><span class="num">${String(n+1).padStart(2,'0')}</span><b>${a[0]}</b><p>${a[1]}</p></div>`).join('')}</div>`),route:x=>shell(x,`<div class="route">${x.items.map((a,n)=>`<div class="stop"><span>${n+1}</span><b>${a}</b></div>`).join('')}</div>`),closing:x=>shell(x,`<div class="visual"><div class="big">“</div><b style="font-size:34px;color:var(--green);text-align:center">${x.call}</b><small>Gracias</small></div>`)};
function render(){const x=slides[i];stage.classList.remove('show');setTimeout(()=>{stage.innerHTML=view[x.t](x);stage.classList.add('show')},80);bar.style.width=((i+1)/slides.length*100)+'%';now.textContent=String(i+1).padStart(2,'0');notes.innerHTML=`<b>Nota para decirlo natural:</b><p>${x.n}</p>`;notes.classList.toggle('show',showNotes);tabs.innerHTML=sections.map(s=>`<button class="${x.s==s?'active':''}" data-go="${slides.findIndex(a=>a.s==s)}">${s}</button>`).join('');map.innerHTML=slides.map((a,n)=>`<button class="${n==i?'active':''}" data-go="${n}"><span>${String(n+1).padStart(2,'0')}</span><b>${a.k}</b><small>${a.h}</small></button>`).join('')}
function go(n){i=Math.max(0,Math.min(slides.length-1,n));render()}document.getElementById('next').onclick=()=>go(i+1);document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('notesBtn').onclick=()=>{showNotes=!showNotes;render()};document.getElementById('mapBtn').onclick=()=>modal.showModal();document.getElementById('close').onclick=()=>modal.close();document.getElementById('fullBtn').onclick=()=>document.documentElement.requestFullscreen?.();addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b){go(+b.dataset.go);if(modal.open)modal.close()}});addEventListener('keydown',e=>{if(['ArrowRight',' ','PageDown'].includes(e.key))go(i+1);if(['ArrowLeft','PageUp'].includes(e.key))go(i-1);if(e.key.toLowerCase()==='m')modal.open?modal.close():modal.showModal();if(e.key.toLowerCase()==='n'){showNotes=!showNotes;render()}if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1)});render();
</script>
</body>
</html>
