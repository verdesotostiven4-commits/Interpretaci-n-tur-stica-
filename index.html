const slides=[
{sec:'Tema',type:'cover',k:'Escuela Superior Politécnica de Chimborazo',h:'Diagnóstico de la interpretación turística del patrimonio cultural en la comunidad de Rumicruz',p:'Fundamentos de Investigación Científica · Carrera de Turismo · PAO 3',tags:['TOAZA KATTY','JIMENEZ JANELA','SANCHEZ MONICA'],photo:'land'},
{sec:'Introducción',type:'photo',k:'Antecedentes',h:'Rumicruz posee un legado material e inmaterial excepcional.',p:'El documento reconoce bienes materiales como la Cruz de Piedra y muros vinculados a la Leyenda de Inga pirca, junto con manifestaciones inmateriales como Carnaval, Finados, gastronomía tradicional y medicina ancestral.',photo:'center',q:'El patrimonio cultural brinda identidad y también puede convertirse en un atractivo turístico.'},
{sec:'Introducción',type:'cards',k:'Problemática y pregunta',h:'La interpretación turística se encuentra en implementación incipiente.',p:'El problema central es que el visitante observa el paisaje y las estructuras, pero no siempre comprende su significado espiritual e histórico.',cards:[['Problemática','La escasa interpretación impide comprender el valor simbólico del patrimonio.'],['Pregunta','¿Cómo fortalecer la interpretación turística para conservar identidad y promover desarrollo sostenible?'],['Justificación','La interpretación permite revelar rasgos naturales y culturales de forma emocionante y provocativa.'],['Propósito','Identificar brechas para que el patrimonio sea conservado y comunicado.']]},
{sec:'Introducción',type:'steps',k:'Objetivos',h:'Diagnosticar el estado actual de la puesta en valor.',p:'Los objetivos organizan el trabajo desde el reconocimiento patrimonial hasta las sugerencias de fortalecimiento.',steps:[['General','Diagnosticar la interpretación turística del patrimonio cultural en Rumicruz.'],['Específico 1','Caracterización de los recursos del patrimonio cultural a través de la identificación.'],['Específico 2','Analizar las estrategias del patrimonio cultural existentes en Rumicruz.'],['Específico 3','Plantear sugerencias de fortalecimiento de interpretación turística.']]},
{sec:'Marco teórico',type:'cards',k:'Conceptos base',h:'El marco teórico explica por qué interpretar es poner en valor.',p:'La presentación conserva los conceptos principales del documento: patrimonio, patrimonio cultural, interpretación y puesta en valor.',cards:[['Patrimonio','Bienes tangibles e intangibles que otorgan identidad y diferencian a una colectividad.'],['Patrimonio cultural','Bienes materiales o inmateriales con valor histórico o artístico que deben protegerse y transmitirse.'],['Interpretación','Proceso comunicativo creativo que enlaza emocional e intelectualmente al visitante con el recurso.'],['Puesta en valor','Identificación, protección, interpretación y difusión del patrimonio cultural.']]},
{sec:'Metodología',type:'photo',k:'Área de estudio',h:'La comunidad Rumicruz está ubicada en el cantón Riobamba, provincia de Chimborazo.',p:'El documento indica que es una comunidad rural compuesta por pobladores indígenas, dedicados a trabajos de ganadería y agricultura.',photo:'map',map:true,q:'Área de estudio: comunidad de Rumicruz.'},
{sec:'Metodología',type:'steps',k:'Diseño metodológico',h:'Revisión documental, entrevista semiestructurada y análisis referencial.',p:'La metodología es cualitativa; por eso no se presentan porcentajes ni datos numéricos inventados.',steps:[['Primer objetivo','Revisión documental mediante fichas de registro para identificar y describir recursos patrimoniales.'],['Segundo objetivo','Entrevista semiestructurada a actores locales vinculados con turismo y cultura.'],['Tercer objetivo','Análisis referencial documental para formular sugerencias viables de fortalecimiento.']]},
{sec:'Metodología',type:'table',k:'Tabla 1',h:'Guía para la entrevista',p:'Preguntas semiestructuradas aplicadas a personas vinculadas al turismo y la cultura.',table:[['Preguntas','Motivación'],['¿De qué manera se explica actualmente la cultura a los visitantes (oral, demostraciones, señalética, talleres)?','Identificar las estrategias de interpretación ya existentes y su nivel de formalidad.'],['¿Qué actividades prácticas realizan o podrían realizar los turistas para conocer mejor la cultura?','Reconocer si existen estrategias de interpretación basadas en la participación activa y la experiencia directa.'],['¿Qué recursos materiales se utilizan para transmitir la cultura?','Evaluar si la comunidad emplea soportes físicos como parte de sus estrategias de interpretación.'],['¿Qué historias, leyendas o mensajes principales se transmiten a los visitantes sobre lugares como la Cruz de Piedra o los Muros del Inca?','Analizar si la interpretación turística incluye narrativas que refuercen el valor espiritual e histórico.']]},
{sec:'Resultados',type:'gallery',k:'Primer objetivo',h:'El inventario patrimonial abarca hallazgos arqueológicos y cultura viva.',p:'La revisión documental permitió identificar bienes materiales y manifestaciones inmateriales presentes en Rumicruz.',photos:['arq','center','art']},
{sec:'Resultados',type:'table',k:'Tabla 2',h:'Registro del Patrimonio Cultural',p:'Recursos identificados en el documento.',table:[['N°','Nombre del recurso','Tipo de recurso'],['1','Arqueología puruhá de pailacucha (Rumicruz)','Patrimonio cultural material (arqueológico)'],['2','Centro de Tradiciones que Nos Unen','Patrimonio Cultural'],['3','Centro de Artesanías','Patrimonio Cultural'],['4','La fanesca','Patrimonio Cultural Inmaterial (Gastronómico)'],['5','Fiesta de San Pedro','Patrimonio cultural inmaterial']]},
{sec:'Resultados',type:'table',k:'Tabla 3',h:'Entrevistas desarrolladas',p:'La información corresponde a los moradores y actores locales mencionados en el documento.',table:[['Entrevistada','Perfil','Tipo de interpretación identificada','Características principales de su estrategia'],['Esteban Lata','Adulto Mayor','Interpretación oral, espontánea y demostrativa','Se basa en la tradición oral y la memoria; aprovecha la demostración simultánea de un oficio como hilar lana.'],['Manuela Toaza','Artesana','Interpretación in situ, experiencial y participativa','Enfocada en el aprender haciendo; usa espacio de trabajo, paja y cabuya para conectar al turista con la identidad local.'],['Ángela Lata','Líder del Grupo','Interpretación vivencial y gastronómica','Refleja guianza comunitaria organizada en turnos y actividades de hermandad como compartir la comida tradicional.'],['José Toaza','Miembro de la comunidad','Interpretación sensorial, dinámica y narrativa-emocional','Conecta al visitante con el entorno mediante sentidos, leyendas y conexión espiritual con el territorio.']]},
{sec:'Resultados',type:'quotes',k:'Segundo objetivo',h:'La interpretación actual es oral, empírica y espontánea.',p:'El documento no presenta porcentajes; presenta hallazgos cualitativos de las entrevistas.',quotes:[['Explicación cultural','Se realiza desde la memoria de los comuneros y sin guiones formales.'],['Aprender haciendo','Los turistas pueden acercarse a la cultura mediante hilado, tejido, cabuya, paja y pampa mesa.'],['Soportes físicos','Existe carencia de carteles, folletos, murales o señalética explicativa.'],['Narrativa espiritual','Las leyendas y el conocimiento botánico transmiten conexión con el entorno y el territorio sagrado.']]},
{sec:'Resultados',type:'table',k:'Tabla 4',h:'Matriz de Sugerencias para el Fortalecimiento de la Interpretación Turística',p:'Las propuestas se organizan según área de intervención, problema identificado y sugerencia definida.',table:[['Área de intervención','Problema identificado','Sugerencia de fortalecimiento definida'],['Medios no guiados (Infraestructura)','Ausencia total de carteles; los turistas transitan sin cuidado y pisan vestigios.','Diseño e implementación de señalética interpretativa y normativa en atractivos principales y senderos.'],['Medios guiados (Narrativa)','La explicación es oral e improvisada, dependiendo de la memoria de las artesanas.','Creación de un Guion Interpretativo Oficial que unifique la historia puruhá, leyendas y botánica local.'],['Turismo Participativo (Experiencia)','El turista tiene un rol pasivo; solo camina y observa.','Diseño de Rutas Vivenciales y Talleres: Ruta de la Lana y la Paja, pampa mesa comunitaria.'],['Talento Humano (Capacitación)','Mujeres y líderes sienten recelo de hablar en público o responder datos técnicos.','Programa de capacitación en técnicas de guianza y expresión oral para habitantes locales.']]},
{sec:'Resultados',type:'gallery',k:'Desarrollo de sugerencias',h:'Señalética, guion interpretativo, rutas vivenciales y capacitación.',p:'El documento plantea soportes físicos, un guion interpretativo, la Ruta de la Cabuya y la Lana y talleres prácticos de guianza para mujeres y jóvenes.',photos:['fiesta','food','art']},
{sec:'Conclusión',type:'cards',k:'Conclusiones',h:'La interpretación turística requiere un enfoque técnico y planificado.',p:'El documento concluye que Rumicruz posee una matriz patrimonial diversa, pero el conocimiento se encuentra disperso y no estructurado para uso turístico.',cards:[['Conclusión 1','La fundamentación teórica y el análisis situacional muestran la necesidad de planificación interpretativa.'],['Conclusión 2','Rumicruz cuenta con patrimonio material e inmaterial de valor, pero en situación de vulnerabilidad.'],['Conclusión 3','Las entrevistas confirman que la interpretación actual es escasa, empírica y espontánea.'],['Conclusión 4','Las sugerencias se organizan en señalética, guion oficial, rutas vivenciales y capacitación.']]},

];
const stage=document.getElementById('stage'),bar=document.getElementById('bar'),drawer=document.getElementById('drawer'),thumbs=document.getElementById('thumbs'),secLabel=document.getElementById('secLabel'),slideTitle=document.getElementById('slideTitle');let i=0;document.getElementById('total').textContent=String(slides.length).padStart(2,'0');
function mediaPhoto(s){return `<div class="photoFrame"><img class="photo ${s.map?'mapImg':''}" src="${img[s.photo]}" alt="${s.h}"></div>`}
function base(s,visual,extra=''){return `<article class="slide ${extra}"><div class="copy"><p class="k">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p>${s.q?`<div class="note">${s.q}</div>`:''}${s.tags?`<div class="chips">${s.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`:''}</div><div class="visual">${visual}</div></article>`}
function makeTable(rows){return `<div><div class="caption">Fuente: Elaboración propia</div><div class="tableWrap"><table><thead><tr>${rows[0].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`}
const views={cover:s=>`<article class="slide dark cover full"><img class="heroBg" src="${img[s.photo]}" alt="paisaje"><div class="shade"></div><div class="copy"><p class="k">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p><div class="chips">${s.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div><div class="footerIdea"><span>Diagnóstico cualitativo</span><span>Patrimonio cultural · Rumicruz</span></div></article>`,photo:s=>base(s,mediaPhoto(s)),cards:s=>base(s,`<div class="cards">${s.cards.map(a=>`<div class="card"><b>${a[0]}</b><p>${a[1]}</p></div>`).join('')}</div>`),steps:s=>base(s,`<div class="steps">${s.steps.map(a=>`<div class="step"><span class="pillNo">${a[0]}</span><div><b>${a[1]}</b><small>${a[2]||''}</small></div></div>`).join('')}</div>`),table:s=>`<article class="slide tableSlide"><div class="copy"><p class="k">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p></div><div class="visual">${makeTable(s.table)}</div></article>`,gallery:s=>base(s,`<div class="gallery"><img src="${img[s.photos[0]]}" alt="imagen principal"><div class="stack"><img src="${img[s.photos[1]]}" alt="imagen secundaria"><img src="${img[s.photos[2]]}" alt="imagen secundaria"></div></div>`),quotes:s=>base(s,`<div class="quoteGrid">${s.quotes.map(q=>`<div class="quote"><b>${q[0]}</b><p>${q[1]}</p></div>`).join('')}</div>`)};
function render(){const s=slides[i];stage.classList.remove('show');setTimeout(()=>{stage.innerHTML=views[s.type](s);stage.classList.add('show')},90);bar.style.width=((i+1)/slides.length*100)+'%';document.getElementById('now').textContent=String(i+1).padStart(2,'0');secLabel.textContent=s.sec;slideTitle.textContent=s.h;thumbs.innerHTML=slides.map((x,n)=>`<button class="thumb ${n===i?'active':''}" data-go="${n}"><small>${String(n+1).padStart(2,'0')} · ${x.sec}</small><b>${x.k}</b><span>${x.h}</span></button>`).join('')}
function go(n){i=Math.max(0,Math.min(slides.length-1,n));render()}document.getElementById('next').onclick=()=>go(i+1);document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('mapBtn').onclick=()=>drawer.classList.add('show');document.getElementById('close').onclick=()=>drawer.classList.remove('show');document.getElementById('fullBtn').onclick=()=>document.documentElement.requestFullscreen?.();addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b){go(+b.dataset.go);drawer.classList.remove('show')}});addEventListener('keydown',e=>{if(['ArrowRight',' ','PageDown'].includes(e.key))go(i+1);if(['ArrowLeft','PageUp'].includes(e.key))go(i-1);if(e.key.toLowerCase()==='m')drawer.classList.toggle('show');if(e.key==='Escape')drawer.classList.remove('show');if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1)});render();
</script>
