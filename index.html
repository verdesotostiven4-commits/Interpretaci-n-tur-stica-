<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rumicruz | Presentación interactiva</title>
<meta name="description" content="Presentación profesional sobre interpretación turística del patrimonio cultural de Rumicruz." />
<style>
:root{--bg:#10150f;--bg2:#28190e;--paper:#fff3dc;--paper2:#ead1aa;--ink:#21170d;--muted:#76634b;--green:#234b34;--clay:#a8552c;--gold:#d4a63c;--cream:#fff8ea;--glass:rgba(16,18,13,.72)}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}body{font-family:Inter,Segoe UI,system-ui,sans-serif;color:var(--cream);background:radial-gradient(circle at 12% 12%,#d4a63c55,transparent 26%),radial-gradient(circle at 88% 80%,#234b3477,transparent 28%),linear-gradient(135deg,var(--bg),var(--bg2) 60%,#0b0f0b)}body:before{content:"";position:fixed;inset:0;opacity:.11;pointer-events:none;background-image:linear-gradient(45deg,#fff 1px,transparent 1px),linear-gradient(-45deg,#fff 1px,transparent 1px);background-size:42px 42px}.app{height:100dvh;display:grid;grid-template-rows:72px 6px 1fr 70px;gap:15px;padding:20px clamp(14px,3vw,42px)}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--glass);border:1px solid #fff4;border-radius:28px;padding:10px 12px;box-shadow:0 24px 70px #0006;backdrop-filter:blur(18px)}.brand{display:flex;gap:12px;align-items:center;min-width:285px}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#ffe29b);color:#20170d;font-weight:900;font-size:25px}.brand small{display:block;color:#fff9;font-size:12px}.nav{display:flex;gap:7px;overflow:auto;scrollbar-width:none;max-width:55vw}.nav button,.tool{border:0;border-radius:999px;padding:10px 13px;white-space:nowrap;background:#ffffff14;color:#fff9;cursor:pointer}.nav button.active{background:var(--paper);color:var(--ink);font-weight:900}.tools{display:flex;gap:8px}.progress{height:6px;border-radius:99px;overflow:hidden;background:#ffffff24}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--clay),#77a062);transition:.45s}.stage{display:grid;place-items:center;perspective:1200px;opacity:0;transform:translateY(16px) scale(.99);transition:.33s cubic-bezier(.16,1,.3,1)}.stage.on{opacity:1;transform:none}.slide{width:min(1220px,100%);height:min(670px,calc(100dvh - 190px));position:relative;overflow:hidden;border:1px solid #fff8;border-radius:34px;background:linear-gradient(135deg,var(--paper),var(--paper2));box-shadow:0 35px 105px #0008;color:var(--ink);display:grid;grid-template-columns:1.02fr .98fr;gap:clamp(24px,4vw,56px);align-items:center;padding:clamp(30px,4.6vw,64px)}.slide:before{content:"";position:absolute;inset:18px;border:1px dashed rgba(35,25,13,.17);border-radius:24px}.slide:after{content:"";position:absolute;right:-110px;top:-125px;width:330px;height:330px;border-radius:50%;background:#a8552c22}.copy,.visual{position:relative;z-index:2}.k{margin:0 0 13px;font-size:13px;letter-spacing:.13em;text-transform:uppercase;font-weight:950;color:var(--green)}.k:before{content:"";display:inline-block;width:28px;height:3px;border-radius:4px;background:var(--clay);margin-right:10px;vertical-align:middle}h1{font-family:Georgia,serif;font-size:clamp(38px,5.1vw,72px);line-height:.95;margin:0;letter-spacing:-.04em}.lead{font-size:clamp(16px,1.45vw,21px);line-height:1.54;color:#5f4e39;margin:22px 0 0}.quote{margin-top:22px;border-left:5px solid var(--gold);border-radius:0 18px 18px 0;background:#fff9;padding:16px 18px;font-weight:800;color:#3b2a18}.visual{min-height:390px;display:grid;place-items:center}.heroImg{width:100%;height:100%;min-height:380px;object-fit:cover;border-radius:28px;border:10px solid #ffffff88;box-shadow:0 28px 65px #3d28142b;background:#fff}.cover{background:linear-gradient(120deg,#10150fee,#28190ec8),var(--paper);color:#fff}.cover:before{border-color:#fff4}.cover h1{color:#fff;text-shadow:0 12px 34px #0006}.cover .lead{color:#fff8}.cover .k{color:#ffd876}.cover .heroImg{border-color:#ffffff35}.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}.chip{border-radius:999px;padding:10px 13px;background:#234b3420;color:var(--green);font-weight:850}.cover .chip{background:#ffffff1a;color:#fff}.cards{display:grid;gap:13px;width:100%}.two{grid-template-columns:1fr 1fr}.card{background:#ffffffb0;border:1px solid rgba(35,25,13,.12);border-radius:24px;padding:18px;box-shadow:0 14px 34px #4b2e140e}.card b{display:block;font-size:20px}.card p,.card small{color:var(--muted);line-height:1.42}.num{font-size:28px;font-weight:950;color:var(--clay)}.steps{display:grid;gap:13px;width:100%}.step{display:grid;grid-template-columns:54px 1fr;gap:13px;align-items:center;background:#ffffffb0;border:1px solid rgba(35,25,13,.12);border-radius:22px;padding:15px;position:relative}.step:not(:last-child):after{content:"";position:absolute;left:41px;bottom:-14px;width:4px;height:14px;background:var(--gold);border-radius:4px}.step span{width:54px;height:54px;border-radius:17px;background:linear-gradient(135deg,var(--gold),#f0d27c);display:grid;place-items:center;font-weight:950}.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}.bad,.good{border-radius:24px;padding:18px;min-height:335px}.bad{background:#a8552c18}.good{background:#234b3420}.compare li{margin:12px 0;color:#5c4a37}.bars{display:grid;gap:13px;width:100%}.bar{background:#ffffffb0;border-radius:18px;padding:14px;border:1px solid rgba(35,25,13,.12)}.bar b{display:flex;justify-content:space-between}.bar i{display:block;height:11px;margin-top:10px;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--gold));animation:grow .8s both}.finalMark{font-family:Georgia,serif;font-size:140px;line-height:.65;color:#a8552c33}.controls{display:flex;justify-content:center;align-items:center}.controlBox{display:flex;gap:14px;align-items:center;background:var(--glass);border:1px solid #fff4;border-radius:999px;padding:9px 11px;box-shadow:0 22px 70px #0007;backdrop-filter:blur(16px)}.round{width:48px;height:48px;border:0;border-radius:50%;background:var(--paper);font-weight:950;font-size:22px;cursor:pointer}.counter{min-width:92px;text-align:center;font-weight:950}.counter span:first-child{color:#ffd876}.notes{position:fixed;right:34px;bottom:98px;width:min(470px,calc(100vw - 44px));background:#10120de8;border:1px solid #fff4;border-radius:26px;padding:18px;box-shadow:0 25px 90px #0009;opacity:0;transform:translateY(14px);pointer-events:none;transition:.25s;z-index:10}.notes.show{opacity:1;transform:none}.notes b{color:#ffd876}.notes p{color:#fff8;line-height:1.45;margin-bottom:0}.modal{position:fixed;inset:0;display:none;place-items:center;background:#000a;backdrop-filter:blur(8px);z-index:20}.modal.show{display:grid}.modalBox{width:min(1020px,calc(100vw - 34px));max-height:82dvh;overflow:auto;background:var(--paper);color:var(--ink);border-radius:30px;padding:22px;box-shadow:0 40px 120px #0009}.modalHead{display:flex;justify-content:space-between;align-items:center}.close{border:0;border-radius:50%;width:44px;height:44px;font-size:25px;background:#e7d2b4}.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.thumb{border:1px solid rgba(35,25,13,.15);border-radius:18px;background:#fff;padding:13px;text-align:left;cursor:pointer}.thumb.active{outline:3px solid var(--gold)}.thumb small{font-weight:950;color:var(--clay)}.thumb b{display:block;margin:6px 0}.thumb span{font-size:12px;color:var(--muted)}@keyframes grow{from{transform:scaleX(.05)}to{transform:scaleX(1)}}@media(max-width:900px){html,body{overflow:auto}.app{height:auto;min-height:100dvh;grid-template-rows:auto 6px auto auto}.top{flex-wrap:wrap}.brand{min-width:100%}.nav{max-width:100%;order:3}.tools{width:100%;justify-content:flex-end}.slide{height:auto;min-height:calc(100dvh - 210px);grid-template-columns:1fr;padding:28px}.two,.compare,.thumbs{grid-template-columns:1fr}.visual{min-height:270px}.heroImg{min-height:260px}h1{font-size:40px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="brand"><div class="logo">R</div><div><b>Rumicruz · Diagnóstico turístico</b><small>Presentación interactiva basada en el documento enviado</small></div></div><nav class="nav" id="nav"></nav><div class="tools"><button class="tool" id="notesBtn">Notas</button><button class="tool" id="mapBtn">Mapa</button><button class="tool" id="fullBtn">Pantalla</button></div></header>
<div class="progress"><span id="bar"></span></div><section class="stage" id="stage"></section><aside class="notes" id="notes"></aside><footer class="controls"><div class="controlBox"><button class="round" id="prev">←</button><div class="counter"><span id="now">01</span> / <span id="total">16</span></div><button class="round" id="next">→</button></div></footer>
</main>
<div class="modal" id="modal"><div class="modalBox"><div class="modalHead"><div><b>Mapa de exposición</b><br><small>Elige una diapositiva para navegar rápido</small></div><button class="close" id="close">×</button></div><div class="thumbs" id="thumbs"></div></div></div>
<script>
const IMG='assets/rumicruz-visual.svg';
const slides=[
{sec:'Inicio',t:'cover',k:'Fundamentos de investigación científica',h:'Diagnóstico de la interpretación turística del patrimonio cultural en la comunidad de Rumicruz',p:'Exposición visual sobre territorio, memoria oral y turismo cultural sostenible.',q:'Idea guía: el patrimonio no basta con existir; también debe poder contarse.',n:'Abre natural: Rumicruz no necesita inventar una historia, necesita organizar la forma de contar la que ya tiene.'},
{sec:'Contexto',t:'image',k:'Introducción',h:'Rumicruz posee territorio, memoria y cultura viva.',p:'El documento ubica la comunidad en la parroquia Calpi, cantón Riobamba, y reconoce un legado material e inmaterial asociado a historia, fiestas, gastronomía, medicina tradicional y artesanías.',q:'La interpretación turística convierte un recurso observado en una experiencia comprendida.',n:'Conecta el tema con el mapa y las imágenes: no es teoría suelta, es una comunidad real.'},
{sec:'Contexto',t:'compare',k:'Problemática',h:'El visitante observa, pero no siempre comprende el significado.',p:'Aunque existen espacios y recursos culturales, la interpretación todavía es incipiente y desorganizada.',bad:['Recursos culturales sin relato ordenado','Poca señalética o soporte visual','Explicación dependiente de la memoria','Visitante con rol principalmente pasivo'],good:['Relato claro y humano','Paneles interpretativos','Guion flexible comunitario','Experiencias participativas'],n:'No digas que la comunidad está mal; di que tiene potencial, pero necesita mediación interpretativa.'},
{sec:'Objetivos',t:'steps',k:'Objetivo general',h:'Diagnosticar la interpretación turística para determinar el estado actual de su puesta en valor.',p:'La investigación se organiza en tres objetivos específicos.',steps:[['01','Caracterizar recursos','Identificar recursos del patrimonio cultural material e inmaterial.'],['02','Analizar estrategias','Reconocer cómo se explica actualmente la cultura a los visitantes.'],['03','Plantear sugerencias','Proponer acciones de fortalecimiento de interpretación turística.']],n:'Esta parte demuestra orden académico y fidelidad al documento.'},
{sec:'Base teórica',t:'cards',k:'Marco teórico',h:'Patrimonio e interpretación conectan herencia, identidad y emoción.',p:'La base teórica define el patrimonio como bienes tangibles e intangibles que dan identidad, y la interpretación como un proceso creativo que vincula al visitante con el significado del lugar.',cards:[['Patrimonio','Herencia material e inmaterial que diferencia a una colectividad.'],['Patrimonio cultural','Bienes y expresiones que deben protegerse y transmitirse.'],['Interpretación','Proceso comunicativo que conecta emoción, conocimiento y lugar.'],['Puesta en valor','Identificar, proteger, interpretar y difundir el patrimonio.']],n:'No leas todo; resume que el marco teórico justifica por qué se necesita interpretar.'},
{sec:'Método',t:'steps',k:'Metodología',h:'El diagnóstico combina documentos, fichas patrimoniales y entrevistas.',p:'El trabajo utiliza revisión documental, fichas de registro, entrevistas semiestructuradas y análisis referencial para formular propuestas.',steps:[['A','Revisión documental','Fuentes secundarias y registros históricos.'],['B','Fichas de registro','Sistematización del patrimonio cultural.'],['C','Entrevistas','Actores locales vinculados con turismo y cultura.'],['D','Análisis referencial','Casos y criterios para fortalecer la interpretación.']],n:'Remarca que escuchar a la comunidad es clave en turismo comunitario.'},
{sec:'Resultados',t:'image',k:'Resultado 1',h:'Rumicruz cuenta con una matriz patrimonial diversa.',p:'El inventario integra arqueología Puruhá de Pailacucha, Centro de Tradiciones, Centro de Artesanías, fanesca y Fiesta de San Pedro.',q:'Lo material y lo inmaterial se complementan: restos, espacios, comida, fiesta y oralidad.',n:'Preséntalo como mapa de riqueza cultural, no como lista.'},
{sec:'Resultados',t:'cards',k:'Patrimonio identificado',h:'Cinco recursos sostienen el potencial turístico cultural.',p:'La sistematización muestra un patrimonio con valor histórico, comunitario, gastronómico y festivo.',cards:[['Arqueología Puruhá de Pailacucha','Patrimonio material arqueológico.'],['Centro de Tradiciones que Nos Unen','Espacio de memoria y aprendizaje comunitario.'],['Centro de Artesanías','Saberes productivos y experiencia manual.'],['La fanesca','Gastronomía ritual asociada a Semana Santa.'],['Fiesta de San Pedro','Patrimonio inmaterial festivo.'],['Cultura viva','Oralidad, prácticas y participación comunitaria.']],n:'Usa ejemplos: fiesta, fanesca, arqueología, artesanías.'},
{sec:'Resultados',t:'image',k:'Patrimonio material',h:'Pailacucha aporta memoria arqueológica y requiere conservación.',p:'Las fichas mencionan hallazgos Puruhá, restos óseos, morteros, metates y fragmentos cerámicos asociados a prácticas funerarias.',q:'Si el visitante no entiende el valor del sitio, puede dañarlo sin intención.',n:'Conecta con la necesidad de señalética normativa.'},
{sec:'Resultados',t:'image',k:'Patrimonio inmaterial',h:'La cultura viva aparece en fiestas, gastronomía y memoria oral.',p:'La Fiesta de San Pedro refleja música, organización y tradición; la fanesca articula fe, alimentación, 12 granos y cohesión comunitaria.',q:'La cultura viva se entiende mejor cuando se participa, se conversa y se comparte.',n:'Habla de la fanesca y la fiesta como experiencia, no solo como dato.'},
{sec:'Entrevistas',t:'cards',k:'Resultado 2',h:'Las entrevistas muestran interpretación viva, pero espontánea.',p:'Los actores locales explican la cultura desde la oralidad, la demostración, el aprendizaje práctico, la gastronomía y la narración emocional.',cards:[['Esteban Lata','Interpretación oral, espontánea y demostrativa.'],['Manuela Toaza','Interpretación in situ, experiencial y participativa.'],['Ángela Lata','Interpretación vivencial y gastronómica.'],['José Toaza','Interpretación sensorial, narrativa y emocional.']],n:'Di: la comunidad sí interpreta, pero todavía sin herramientas formales.'},
{sec:'Diagnóstico',t:'bars',k:'Lectura del diagnóstico',h:'La fortaleza es la cultura viva; la brecha es la falta de estructura.',p:'El análisis evidencia oralidad fuerte, turismo participativo potencial y carencia de soportes físicos y guion unificado.',bars:[['Oralidad y memoria',92],['Aprender haciendo',86],['Soportes físicos',18],['Guion unificado',22],['Seguridad al hablar en público',45]],n:'Aclara que los porcentajes son visuales para explicar intensidad del diagnóstico, no una encuesta estadística.'},
{sec:'Propuesta',t:'compare',k:'Brechas y respuestas',h:'Cada problema encontrado tiene una acción de fortalecimiento.',p:'La propuesta transforma la guianza empírica en un producto turístico cultural y sostenible.',bad:['Sin carteles interpretativos','Relato improvisado','Turista pasivo','Recelo al hablar en público'],good:['Señalética normativa e interpretativa','Guion oficial flexible','Rutas vivenciales y talleres','Capacitación en guianza y expresión oral'],n:'Esta es la transición más importante: diagnóstico → propuesta.'},
{sec:'Propuesta',t:'cards',k:'Cuatro ejes técnicos',h:'Señalética, guion, ruta vivencial y capacitación.',p:'Las sugerencias responden directamente a las falencias detectadas en territorio.',cards:[['1. Señalética interpretativa','Paneles cortos, visuales y normativos para proteger y explicar.'],['2. Guion oficial flexible','Relato común sobre historia Puruhá, leyendas, botánica y Pachamama.'],['3. Ruta de la Cabuya y la Lana','Mini talleres, aprendizaje práctico y pampa mesa comunitaria.'],['4. Capacitación local','Expresión oral, manejo de grupos y atención al visitante.']],n:'Resalta que el guion no quita naturalidad; solo ordena el mensaje.'},
{sec:'Propuesta',t:'steps',k:'Ruta vivencial',h:'Ruta de la Cabuya y la Lana: del observador al participante.',p:'La experiencia puede organizarse con inicio, relato, práctica, comida comunitaria y cierre reflexivo.',steps:[['1','Bienvenida','Contexto de Rumicruz y normas de respeto.'],['2','Relato del territorio','Leyendas, historia y conexión con la Pachamama.'],['3','Taller artesanal','Lana, cabuya, paja y aprendizaje práctico.'],['4','Pampa mesa','Gastronomía y convivencia cultural.'],['5','Cierre','Mensaje de conservación y valoración patrimonial.']],n:'Véndelo como producto turístico humano y viable.'},
{sec:'Cierre',t:'final',k:'Conclusión',h:'Interpretar Rumicruz es cuidar su memoria y abrir oportunidades sostenibles.',p:'El patrimonio ya existe; el reto es organizarlo, comunicarlo con emoción y protegerlo mediante participación comunitaria.',q:'De patrimonio observado a patrimonio vivido.',n:'Cierra con: cuando el turista comprende, respeta; y cuando la comunidad comunica, fortalece su identidad.'}
];
const stage=document.getElementById('stage'),bar=document.getElementById('bar'),nav=document.getElementById('nav'),notes=document.getElementById('notes'),modal=document.getElementById('modal'),thumbs=document.getElementById('thumbs');let i=0,note=false;document.getElementById('total').textContent=String(slides.length).padStart(2,'0');const secs=[...new Set(slides.map(s=>s.sec))];
function img(){return `<img class="heroImg" src="${IMG}" alt="Collage visual de Rumicruz basado en anexos del documento">`}
function shell(s,v,c=''){return `<article class="slide ${c}"><div class="copy"><p class="k">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p>${s.q?`<div class="quote">${s.q}</div>`:''}</div><div class="visual">${v}</div></article>`}
const view={cover:s=>shell(s,img(),'cover'),image:s=>shell(s,img()),cards:s=>shell(s,`<div class="cards two">${s.cards.map(a=>`<div class="card"><b>${a[0]}</b><p>${a[1]}</p></div>`).join('')}</div>`),steps:s=>shell(s,`<div class="steps">${s.steps.map(a=>`<div class="step"><span>${a[0]}</span><div><b>${a[1]}</b><small>${a[2]}</small></div></div>`).join('')}</div>`),compare:s=>shell(s,`<div class="compare"><div class="bad"><b>Situación actual</b><ul>${s.bad.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="good"><b>Fortalecimiento</b><ul>${s.good.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`),bars:s=>shell(s,`<div class="bars">${s.bars.map(a=>`<div class="bar"><b>${a[0]} <span>${a[1]}%</span></b><i style="width:${a[1]}%"></i></div>`).join('')}</div>`),final:s=>shell(s,`<div class="card" style="min-height:390px;display:grid;place-items:center;text-align:center;background:linear-gradient(135deg,#234b3420,#d4a63c30)"><div><div class="finalMark">”</div><p style="font-family:Georgia,serif;font-size:38px;line-height:1.08;color:var(--green);margin:0">${s.q}</p><div class="chips" style="justify-content:center"><span class="chip">Gracias</span><span class="chip">Preguntas</span></div></div></div>`)};
function render(){const s=slides[i];stage.classList.remove('on');setTimeout(()=>{stage.innerHTML=view[s.t](s);stage.classList.add('on')},90);bar.style.width=((i+1)/slides.length*100)+'%';document.getElementById('now').textContent=String(i+1).padStart(2,'0');notes.innerHTML=`<b>Nota para exponer natural:</b><p>${s.n}</p>`;notes.classList.toggle('show',note);nav.innerHTML=secs.map(sec=>`<button class="${s.sec===sec?'active':''}" data-go="${slides.findIndex(x=>x.sec===sec)}">${sec}</button>`).join('');thumbs.innerHTML=slides.map((x,n)=>`<button class="thumb ${n===i?'active':''}" data-go="${n}"><small>${String(n+1).padStart(2,'0')} · ${x.sec}</small><b>${x.k}</b><span>${x.h}</span></button>`).join('')}
function go(n){i=Math.max(0,Math.min(slides.length-1,n));render()}document.getElementById('next').onclick=()=>go(i+1);document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('notesBtn').onclick=()=>{note=!note;render()};document.getElementById('mapBtn').onclick=()=>modal.classList.add('show');document.getElementById('close').onclick=()=>modal.classList.remove('show');document.getElementById('fullBtn').onclick=()=>document.documentElement.requestFullscreen?.();addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b){go(+b.dataset.go);modal.classList.remove('show')}});addEventListener('keydown',e=>{if(['ArrowRight',' ','PageDown'].includes(e.key))go(i+1);if(['ArrowLeft','PageUp'].includes(e.key))go(i-1);if(e.key.toLowerCase()==='n'){note=!note;render()}if(e.key.toLowerCase()==='m')modal.classList.toggle('show');if(e.key==='Escape')modal.classList.remove('show');if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1)});render();
</script>
</body>
</html>
