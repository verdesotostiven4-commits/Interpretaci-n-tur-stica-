function image(key,cls='photo'){return `<img class="${cls}" src="${img[key]}" alt="Imagen visual de ${key}" loading="eager">`}
function base(s,visual,extra=''){return `<article class="slide ${extra}"><div class="copy"><p class="kicker">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p>${s.q?`<div class="tagline">${s.q}</div>`:''}${s.tags?`<div class="chips">${s.tags.map(x=>`<span>${x}</span>`).join('')}</div>`:''}</div><div class="media">${visual}</div></article>`}
const views={cover:s=>`<article class="slide cover"><img class="bg" src="${img[s.photo]}"><div class="shade"></div><div class="copy"><p class="kicker">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p><div class="chips">${s.tags.map(x=>`<span>${x}</span>`).join('')}</div></div></article>`,photo:s=>base(s,`<div class="frame">${image(s.photo)}</div>`),map:s=>base(s,`<div class="miniMap"><svg viewBox="0 0 650 410"><path d="M60 300 C140 220 195 250 250 155 C330 35 455 135 590 70" fill="none" stroke="#173f2c" stroke-width="18" stroke-linecap="round" opacity=".72"/><path d="M75 325 C160 280 245 295 335 220 C430 140 515 170 605 120" fill="none" stroke="#d8a83d" stroke-width="10" stroke-linecap="round" opacity=".72"/><circle cx="378" cy="192" r="16" fill="#e1382d" stroke="#fff" stroke-width="8"/><text x="42" y="72" font-size="36" font-family="Georgia" fill="#173f2c" font-weight="700">Calpi · Riobamba</text><text x="42" y="110" font-size="22" font-family="Inter,Arial" fill="#806b50">Ruta conceptual hacia Rumicruz</text></svg><span class="mapPoint"></span><div class="routeText">Riobamba → Calpi → Rumicruz · paisaje, memoria y comunidad</div></div>`),split:s=>base(s,`<div class="split"><div class="panel"><h3>Situación actual</h3><ul>${s.left.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="panel"><h3>Camino propuesto</h3><ul>${s.right.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`),timeline:s=>base(s,`<div class="timeline">${s.steps.map(a=>`<div class="step reveal"><span>${a[0]}</span><div><b>${a[1]}</b><small>${a[2]}</small></div></div>`).join('')}</div>`),cards:s=>base(s,`<div class="cards">${s.cards.map(a=>`<div class="card reveal"><b>${a[0]}</b><p>${a[1]}</p></div>`).join('')}</div>`),gallery:s=>base(s,`<div class="gallery"><img src="${img[s.photos[0]]}" alt="Visual principal"><div class="stack"><img src="${img[s.photos[1]]}" alt="Visual secundario"><img src="${img[s.photos[2]]}" alt="Visual secundario"></div></div>`),stats:s=>base(s,`<div class="stats">${s.stats.map(a=>`<div class="stat"><b>${a[0]} <span>${a[1]}%</span></b><i style="width:${a[1]}%"></i></div>`).join('')}</div>`),matrix:s=>base(s,`<div class="matrix">${s.axes.map(a=>`<div class="axis reveal"><b>${a[0]}</b><p>${a[1]}</p></div>`).join('')}</div>`),closing:s=>`<article class="slide closing"><div class="copy"><p class="kicker">${s.k}</p><h1>${s.h}</h1><p class="lead">${s.p}</p><div class="photoStrip">${s.photos.map(p=>`<img src="${img[p]}">`).join('')}</div></div></article>`};
function render(){const s=slides[i];stage.classList.remove('show');setTimeout(()=>{stage.innerHTML=views[s.type](s);stage.classList.add('show')},80);bar.style.width=((i+1)/slides.length*100)+'%';document.getElementById('now').textContent=String(i+1).padStart(2,'0');nav.innerHTML=sections.map(sec=>`<button class="${s.sec===sec?'active':''}" data-go="${slides.findIndex(x=>x.sec===sec)}">${sec}</button>`).join('');thumbs.innerHTML=slides.map((x,n)=>`<button class="thumb ${n===i?'active':''}" data-go="${n}"><small>${String(n+1).padStart(2,'0')} · ${x.sec}</small><b>${x.k}</b><span>${x.h}</span></button>`).join('')}
function go(n){i=Math.max(0,Math.min(slides.length-1,n));render()}document.getElementById('next').onclick=()=>go(i+1);document.getElementById('prev').onclick=()=>go(i-1);document.getElementById('mapBtn').onclick=()=>drawer.classList.add('show');document.getElementById('exploreBtn').onclick=()=>drawer.classList.add('show');document.getElementById('close').onclick=()=>drawer.classList.remove('show');document.getElementById('fullBtn').onclick=()=>document.documentElement.requestFullscreen?.();addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b){go(+b.dataset.go);drawer.classList.remove('show')}});addEventListener('keydown',e=>{if(['ArrowRight',' ','PageDown'].includes(e.key))go(i+1);if(['ArrowLeft','PageUp'].includes(e.key))go(i-1);if(e.key.toLowerCase()==='m')drawer.classList.toggle('show');if(e.key==='Escape')drawer.classList.remove('show');if(e.key==='Home')go(0);if(e.key==='End')go(slides.length-1)});render();
</script>
</body>
</html>
